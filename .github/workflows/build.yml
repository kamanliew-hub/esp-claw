name: Build ESP-Claw Firmware

on:
  push:
    branches: [ "main" ]          # 你的仓库默认分支，保持原样
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ESP-Claw upstream repo
        uses: actions/checkout@v4
        with:
          repository: espressif/esp-claw
          ref: master                        # ✅ 上游分支是 master

      - name: Build firmware with ESP-IDF v5.5.4
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32s3
          path: application/edge_agent       # ✅ 正确路径
          command: |
            pip install esp-bmgr-assist &&
            idf.py gen-bmgr-config -c ./boards -b esp32_S3_DevKitC_1 &&
            idf.py build

      - name: Package firmware binaries
        run: |
          mkdir -p release
          cp application/edge_agent/build/bootloader/bootloader.bin release/
          cp application/edge_agent/build/partition_table/partition-table.bin release/
          cp application/edge_agent/build/edge_agent.bin release/         # ✅ 正确二进制名
          cp application/edge_agent/build/flash_args release/
          cp application/edge_agent/build/ota_data_initial.bin release/
          cd release && zip -j esp-claw-esp32s3-firmware.zip *

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "ESP-Claw Firmware v${{ github.run_number }}"
          body: "✅ 自动编译完成\n- 开发板: esp32_S3_DevKitC_1\n- 芯片: ESP32-S3"
          files: release/esp-claw-esp32s3-firmware.zip
          make_latest: true
