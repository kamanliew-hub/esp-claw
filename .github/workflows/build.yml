name: Build ESP-Claw Firmware

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32s3
          path: application/edge_agent
          command: |
            set -e
            pip install -q esp-bmgr-assist
            pip install --upgrade pip
            idf.py gen-bmgr-config -c ./boards -b esp32_S3_DevKitC_1_breadboard
            printf 'CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y\nCONFIG_PARTITION_TABLE_CUSTOM_FILENAME="partitions_16MB.csv"\n' >> sdkconfig.defaults
            rm -f sdkconfig
            idf.py reconfigure
            # 验证分区表是不是16MB版
            idf.py build

      - name: Package firmware binaries
        run: |
          cd application/edge_agent
          mkdir -p $GITHUB_WORKSPACE/release
          cp build/bootloader/bootloader.bin $GITHUB_WORKSPACE/release/
          cp build/partition_table/partition-table.bin $GITHUB_WORKSPACE/release/
          cp build/edge_agent.bin $GITHUB_WORKSPACE/release/
          cp build/flash_args $GITHUB_WORKSPACE/release/
          cp build/ota_data_initial.bin $GITHUB_WORKSPACE/release/
          cd $GITHUB_WORKSPACE/release && zip -j esp-claw-esp32s3-firmware.zip *

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: build-${{ github.run_number }}
          name: "ESP-Claw Firmware v${{ github.run_number }}"
          body: "✅ 自动编译完成\n- 开发板: esp32_S3_DevKitC_1_breadboard_N16R8\n- 芯片: ESP32-S3 (16MB Flash + 8MB PSRAM)"
          files: release/esp-claw-esp32s3-firmware.zip
          make_latest: true
