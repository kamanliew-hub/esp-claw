version: 1.0.0
# Devices Configuration for Waveshare ESP32-S3-Zero N8R8

devices:
  - name: led_strip
    chip: ws2812
    type: led_strip
    sub_type: rmt
    version: 1.0.0
    init_skip: true
    config:
      strip_gpio_num: 21
      max_leds: 1
      led_model: LED_MODEL_WS2812
      color_component_format: LED_STRIP_COLOR_COMPONENT_FMT_GRB
      invert_out: false
      rmt:
        clk_src: RMT_CLK_SRC_DEFAULT
        resolution_hz: 10000000
        mem_block_symbols: 0
        with_dma: true

  - name: buttons
    chip: gpio_button
    type: custom
    version: default
    init_skip: true
    config:
      boot_gpio_num: 0
      active_level: 0

  - name: uart0_header
    chip: header
    type: custom
    version: default
    init_skip: true
    config:
      tx_gpio_num: 43
      rx_gpio_num: 44
      note: "UART0 header pins; console defaults to native USB Serial/JTAG"

  - name: usb_serial_jtag
    chip: esp32s3_native_usb
    type: custom
    version: default
    init_skip: true
    config:
      dm_gpio_num: 19
      dp_gpio_num: 20
      note: "Native USB Serial/JTAG through the USB-C connector"

  - name: expansion_header
    chip: gpio_header
    type: custom
    version: default
    init_skip: true
    config:
      note: "No fixed I2C/SPI/audio/display/storage devices; GPIO33-GPIO37 are reserved for Octal PSRAM"
