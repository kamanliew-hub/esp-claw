version: 1.0.0

peripherals:
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 1
      pins:
        sda: 7
        scl: 8

  - name: i2s_audio_out
    type: i2s
    role: slave
    format: std-out
    config: &bt_audio_i2s_config
      port: 0
      sample_rate_hz: 16000
      clk_src: I2S_CLK_SRC_DEFAULT
      mclk_multiple: 256
      data_bit_width: 32
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO
      slot_mode: I2S_SLOT_MODE_STEREO
      slot_mask: I2S_STD_SLOT_BOTH
      ws_width: 32
      ws_pol: false
      bit_shift: true
      left_align: true
      big_endian: false
      bit_order_lsb: false
      pins:
        mclk: -1
        bclk: 12
        ws: 10
        dout: 9
        din: 11
      invert_flags:
        mclk_inv: false
        bclk_inv: false
        ws_inv: false

  - name: i2s_audio_in
    type: i2s
    role: slave
    format: std-in
    config: *bt_audio_i2s_config

  - name: ldo_mipi
    type: ldo
    config:
      chan_id: 3
      voltage_mv: 2500
      adjustable: 1
      owned_by_hw: 0

  - name: dsi_display
    type: dsi
    config:
      bus_id: 0
      data_lanes: 2
      phy_clk_src: MIPI_DSI_PHY_CLK_SRC_DEFAULT
      lane_bit_rate_mbps: 1000

  - name: ledc_backlight
    type: ledc
    version: default
    config:
      gpio_num: 52
      speed_mode: LEDC_LOW_SPEED_MODE
      channel: 1
      timer_sel: LEDC_TIMER_0
      duty: 0
      duty_resolution: LEDC_TIMER_10_BIT
      freq_hz: 5000
