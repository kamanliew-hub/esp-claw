version: 1.0.0
# Peripherals for EDA TV Pro (智能小电视)
# INMP441 mic + MAX98357 speaker + ST7789 240x240 LCD + LED

peripherals:

  # ST7789 LCD display (SPI3)
  - name: spi_display
    type: spi
    role: master
    config:
      spi_bus_config:
        spi_port: SPI3_HOST
        data0_io_num: 11
        sclk_io_num: 12
        max_transfer_sz: 115200

  # LCD backlight (LEDC PWM)
  - name: ledc_backlight
    type: ledc
    role: none
    config:
      gpio_num: 38
      freq_hz: 5000
      duty: 0
      duty_resolution: LEDC_TIMER_10_BIT
      output_invert: false

  # MAX98357 speaker amplifier (I2S STD TX on I2S1)
  - name: i2s_audio_out
    type: i2s
    role: master
    format: std-out
    config:
      port: 1
      sample_rate_hz: 24000
      mclk_multiple: 256
      data_bit_width: 16
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO
      slot_mode: I2S_SLOT_MODE_MONO
      slot_mask: I2S_STD_SLOT_BOTH
      ws_width: 16
      pins:
        mclk: -1
        bclk: 15
        ws: 16
        dout: 7
        din: -1

  # INMP441 microphone (I2S STD RX on I2S0)
  - name: i2s_audio_in
    type: i2s
    role: master
    format: std-in
    config:
      port: 0
      sample_rate_hz: 16000
      mclk_multiple: 256
      data_bit_width: 16
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO
      slot_mode: I2S_SLOT_MODE_MONO
      slot_mask: I2S_STD_SLOT_BOTH
      ws_width: 16
      pins:
        mclk: -1
        bclk: 5
        ws: 4
        dout: -1
        din: 6

  # Boot button
  - name: gpio_boot_btn
    type: gpio
    role: io
    config:
      pin: 0
      mode: GPIO_MODE_INPUT
      default_level: 1

  # Touch button
  - name: gpio_touch_btn
    type: gpio
    role: io
    config:
      pin: 40
      mode: GPIO_MODE_INPUT
      default_level: 1

  # ASR (voice recognition) button
  - name: gpio_asr_btn
    type: gpio
    role: io
    config:
      pin: 21
      mode: GPIO_MODE_INPUT
      default_level: 1

  # Built-in LED
  - name: gpio_led
    type: gpio
    role: io
    config:
      pin: 2
      mode: GPIO_MODE_OUTPUT
      default_level: 0
