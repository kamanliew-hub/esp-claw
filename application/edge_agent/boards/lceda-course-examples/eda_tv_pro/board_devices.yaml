version: 1.0.0
# Devices for EDA TV Pro (智能小电视)

devices:

  # MAX98357: I2S Class-D speaker amplifier (I2S1 STD TX)
  - name: audio_dac
    chip: internal
    type: audio_codec
    version: default
    config:
      adc_enabled: false
      dac_enabled: true
      dac_max_channel: 1
      dac_channel_mask: "1"
      dac_init_gain: 0
      mclk_enabled: false
    peripherals:
      - name: i2s_audio_out

  # INMP441: I2S MEMS microphone (I2S0 STD RX)
  - name: audio_adc
    chip: internal
    type: audio_codec
    version: default
    config:
      adc_enabled: true
      dac_enabled: false
      adc_max_channel: 1
      adc_channel_mask: "1"
      adc_init_gain: 0
      mclk_enabled: false
    peripherals:
      - name: i2s_audio_in

  # ST7789 LCD 240x240 over SPI
  - name: display_lcd
    chip: st7789
    type: display_lcd
    sub_type: spi
    version: default
    config:
      mirror_x: false
      mirror_y: false
      swap_xy: false
      invert_color: true
      x_max: 240
      y_max: 240
      io_spi_config:
        cs_gpio_num: -1
        dc_gpio_num: 47
        spi_mode: 2
        pclk_hz: 40000000
      lcd_panel_config:
        reset_gpio_num: 48
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        vendor_config: NULL
    peripherals:
      - name: spi_display

  # LCD backlight
  - name: lcd_brightness
    type: ledc_ctrl
    version: default
    peripherals:
      - name: ledc_backlight

  # Built-in LED
  - name: board_led
    type: gpio_ctrl
    version: default
    config:
      active_level: 1
      default_level: 0
    peripherals:
      - name: gpio_led
