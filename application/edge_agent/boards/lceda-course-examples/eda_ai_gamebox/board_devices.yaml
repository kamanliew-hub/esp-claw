version: 1.0.0
# Devices for EDA AI GameBox (掌上游戏机)

devices:

  # ST7789 LCD 240x320 over SPI
  - name: display_lcd
    chip: st7789
    type: display_lcd
    sub_type: spi
    version: default
    config:
      # 顺时针旋转 90 度：swap_xy + mirror_x，逻辑分辨率 320x240
      mirror_x: true
      mirror_y: false
      swap_xy: true
      invert_color: true
      x_max: 320
      y_max: 240
      io_spi_config:
        cs_gpio_num: 11
        dc_gpio_num: 12
        spi_mode: 0
        pclk_hz: 40000000
      lcd_panel_config:
        reset_gpio_num: -1
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        vendor_config: NULL
    peripherals:
      - name: spi_display

  # LCD backlight
  - name: lcd_brightness
    type: ledc_ctrl
    version: default
    peripherals:
      - name: ledc_backlight

  # 五向按键
  - name: dpad_up
    type: gpio_ctrl
    version: default
    config:
      active_level: 0
      default_level: 1
    peripherals:
      - name: gpio_dpad_up

  - name: dpad_down
    type: gpio_ctrl
    version: default
    config:
      active_level: 0
      default_level: 1
    peripherals:
      - name: gpio_dpad_down

  - name: dpad_left
    type: gpio_ctrl
    version: default
    config:
      active_level: 0
      default_level: 1
    peripherals:
      - name: gpio_dpad_left

  - name: dpad_right
    type: gpio_ctrl
    version: default
    config:
      active_level: 0
      default_level: 1
    peripherals:
      - name: gpio_dpad_right

  - name: dpad_center
    type: gpio_ctrl
    version: default
    config:
      active_level: 0
      default_level: 1
    peripherals:
      - name: gpio_dpad_center

  # XYAB 按键
  - name: btn_x
    type: gpio_ctrl
    version: default
    config:
      active_level: 0
      default_level: 1
    peripherals:
      - name: gpio_btn_x

  - name: btn_y
    type: gpio_ctrl
    version: default
    config:
      active_level: 0
      default_level: 1
    peripherals:
      - name: gpio_btn_y

  - name: btn_a
    type: gpio_ctrl
    version: default
    config:
      active_level: 0
      default_level: 1
    peripherals:
      - name: gpio_btn_a

  - name: btn_b
    type: gpio_ctrl
    version: default
    config:
      active_level: 0
      default_level: 1
    peripherals:
      - name: gpio_btn_b

  # 无源蜂鸣器
  - name: buzzer
    type: ledc_ctrl
    version: default
    peripherals:
      - name: ledc_buzzer
